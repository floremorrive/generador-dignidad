<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Columnas — Dignidad & Compromiso</title>
<link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Alexandria', sans-serif;
    background: #0d0520;
    color: #fff;
    min-height: 100vh;
  }

  header {
    background: #1a0a4a;
    border-bottom: 3px solid #f5a623;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 1.15rem; font-weight: 800; letter-spacing: .04em; }
  header span { color: #f5a623; font-size: .85rem; font-weight: 600; }

  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 0;
    min-height: calc(100vh - 65px);
  }

  /* ── Panel izquierdo ── */
  .panel {
    background: #1a0a4a;
    padding: 28px 24px;
    border-right: 1px solid #2d1a6e;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field label {
    display: block;
    font-size: .75rem;
    font-weight: 700;
    color: #f5a623;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 6px;
  }

  select, input[type="text"], textarea {
    width: 100%;
    background: #2d1a6e;
    border: 1px solid #4a2fa0;
    color: #fff;
    font-family: 'Alexandria', sans-serif;
    font-size: .92rem;
    padding: 10px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color .2s;
  }
  select:focus, input:focus, textarea:focus { border-color: #f5a623; }
  textarea { resize: vertical; min-height: 72px; line-height: 1.4; }

  .file-btn {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .file-btn label.btn {
    background: #2d1a6e;
    border: 1px solid #4a2fa0;
    color: #f5a623;
    font-size: .8rem;
    font-weight: 700;
    padding: 9px 14px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s;
  }
  .file-btn label.btn:hover { background: #3d2a80; }
  .file-btn span { font-size: .78rem; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  input[type="file"] { display: none; }

  .author-preview {
    background: #2d1a6e;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: .78rem;
    color: #ccc;
    line-height: 1.4;
    min-height: 42px;
  }
  .author-preview strong { color: #f5a623; }

  .divider { border: none; border-top: 1px solid #2d1a6e; }

  .gen-btn {
    background: #f5a623;
    color: #1a0a4a;
    font-family: 'Alexandria', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    border: none;
    border-radius: 8px;
    padding: 14px;
    cursor: pointer;
    letter-spacing: .05em;
    transition: background .15s, transform .1s;
  }
  .gen-btn:hover { background: #e09510; }
  .gen-btn:active { transform: scale(.97); }

  .dl-btn {
    background: #2d1a6e;
    color: #f5a623;
    font-family: 'Alexandria', sans-serif;
    font-size: .88rem;
    font-weight: 700;
    border: 2px solid #f5a623;
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    letter-spacing: .04em;
    display: none;
    transition: background .15s;
  }
  .dl-btn:hover { background: #3d2a80; }

  .status {
    font-size: .78rem;
    color: #f5a623;
    font-style: italic;
    text-align: center;
    min-height: 18px;
  }

  /* ── Panel derecho (preview) ── */
  .preview-area {
    background: #100325;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 36px 24px;
  }

  .canvas-wrap {
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,.7);
  }

  canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }

  /* Sección de gestión de autores */
  .manage-section {
    margin-top: 4px;
  }
  .manage-section summary {
    font-size: .75rem;
    font-weight: 700;
    color: #aaa;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 6px 0;
  }
  .manage-section summary:hover { color: #f5a623; }
  .manage-inner { padding-top: 14px; display: flex; flex-direction: column; gap: 10px; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
    .preview-area { padding: 20px 12px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>GENERADOR DE COLUMNAS</h1>
    <span>Dignidad &amp; Compromiso</span>
  </div>
</header>

<div class="layout">

  <!-- ── Panel de control ── -->
  <aside class="panel">

    <div class="field">
      <label>Autor</label>
      <select id="sel-autor">
        <option value="">— Seleccione —</option>
      </select>
    </div>

    <div class="author-preview" id="author-preview">Seleccione un autor para ver su información.</div>

    <div class="field">
      <label>Título de la columna</label>
      <textarea id="inp-titulo" rows="3" placeholder="Escriba aquí el título o la frase central de la columna"></textarea>
    </div>

    <div class="field">
      <label>Categoría</label>
      <select id="sel-categoria">
        <option>OPINIÓN</option>
        <option>ANÁLISIS</option>
        <option>ECONOMÍA</option>
        <option>POLÍTICA</option>
        <option>EDITORIAL</option>
      </select>
    </div>

    <div class="field">
      <label>Imagen de fondo</label>
      <div class="file-btn">
        <label class="btn" for="inp-fondo">Buscar…</label>
        <span id="fondo-name">Sin imagen</span>
      </div>
      <input type="file" id="inp-fondo" accept="image/*">
    </div>

    <hr class="divider">

    <button class="gen-btn" id="btn-gen">⚡ GENERAR IMAGEN</button>
    <button class="dl-btn" id="btn-dl">⬇ DESCARGAR PNG</button>
    <div class="status" id="status"></div>

    <hr class="divider">

    <!-- Gestión de autores -->
    <details class="manage-section">
      <summary>⚙ Gestión de autores</summary>
      <div class="manage-inner">
        <div class="field">
          <label>Nombre</label>
          <input type="text" id="m-nombre" placeholder="Nombre completo">
        </div>
        <div class="field">
          <label>Bio</label>
          <input type="text" id="m-bio" placeholder="Cargo o descripción corta">
        </div>
        <div class="field">
          <label>Foto del autor</label>
          <div class="file-btn">
            <label class="btn" for="m-foto">Buscar…</label>
            <span id="m-foto-name">Sin foto</span>
          </div>
          <input type="file" id="m-foto" accept="image/png,image/jpeg">
        </div>
        <p style="font-size:.72rem;color:#aaa;line-height:1.4">
          Las fotos se guardan solo en este navegador. Para añadirlas permanentemente al sitio, súbalas a la carpeta <code>fotos/</code> en GitHub y edite <code>autores.json</code>.
        </p>
      </div>
    </details>

  </aside>

  <!-- ── Área de preview ── -->
  <main class="preview-area">
    <div class="canvas-wrap">
      <canvas id="cv" width="1080" height="1350"></canvas>
    </div>
  </main>

</div>

<script>
// ── Estado global ──────────────────────────────────────────────────────────
const STATE = {
  autores: [],
  autorActual: null,
  imgFondo: null,
  imgPerfil: null,
  imgPerfilLocal: null,
  imgLogo: null,
};

const CANVAS_W = 1080;
const CANVAS_H = 1350;

// ── Colores Pantone oficiales ──────────────────────────────────────────────
const PURPLE  = '#442f7f';   // PANTONE Medium Purple C  R:68 G:47 B:127
const ORANGE  = '#ed7330';   // PANTONE 158 C            R:237 G:115 B:48
const WHITE   = '#ffffff';
const OVERLAY = 'rgba(68,47,127,0.38)'; // overlay morado Pantone semi-transparente

// ── Layout EXACTO extraído del PPT (python-pptx, julio 2026) ─────────────
// Slide: 19.05cm × 23.812cm  →  Canvas: 1080px × 1350px
const W = CANVAS_W, H = CANVAS_H;
const p = (pct, total) => Math.round(pct / 100 * total);

// Fondo (imagen de fondo): 0-53.23%
const FONDO_H = p(53.23, H);   // 719

// Raya naranja (Shape 6 dentro de Grupo 9): top=52.48%, h=0.75%
const STRIPE_Y = p(52.48, H);  // 708
const STRIPE_H = p( 0.75, H);  // 10

// Sección morada inferior (Shape 5): top=52.80%
const PURPLE_Y = p(52.80, H);  // 713

// Sombra fondo: left=26.67%, top=27.20%, w=46.67%, h=40.53%
const SHADOW_X = p(26.67, W);  // 288
const SHADOW_Y = p(27.20, H);  // 367
const SHADOW_W = p(46.67, W);  // 504
const SHADOW_H = p(40.53, H);  // 547

// Logo imagen: left=70.85%, top=3.53%, w=27.98%, h=7.47%
const LOGO_X = p(70.85, W);    // 765
const LOGO_Y = p( 3.53, H);    // 48
const LOGO_W = p(27.98, W);    // 302
const LOGO_H = p( 7.47, H);    // 101

// Texto — posiciones exactas del PPT
const TX    = p( 6.00, W);     // 65
const TW    = p(88.00, W);     // 950
const Y_CAT = p(66.13, H);     // 893  OPINIÓN
const Y_TIT = p(69.87, H);     // 943  Título
const Y_MAX = p(86.40, H);     // 1166 Título bottom
const Y_LIN = p(88.00, H);     // 1188 Línea divisora
const Y_AUT = p(89.39, H);     // 1207 Autor
const Y_BIO = p(93.12, H);     // 1257 Bio

// Tamaños de fuente (pt PPT × 2 = px canvas)
const F_CAT = 38;
const F_TIT = 50;
const F_AUT = 30;
const F_BIO = 24;

// ── Carga de autores ───────────────────────────────────────────────────────
async function cargarAutores() {
  try {
    const res = await fetch('autores.json');
    STATE.autores = await res.json();
  } catch {
    STATE.autores = [];
  }
  // Leer autores locales guardados en localStorage
  const locales = JSON.parse(localStorage.getItem('autores_extra') || '[]');
  STATE.autores = [...STATE.autores, ...locales];
  poblarSelector();
}

function poblarSelector() {
  const sel = document.getElementById('sel-autor');
  sel.innerHTML = '<option value="">— Seleccione —</option>';
  STATE.autores.forEach((a, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = a.nombre;
    sel.appendChild(opt);
  });
}

// ── Selección de autor ─────────────────────────────────────────────────────
document.getElementById('sel-autor').addEventListener('change', async function () {
  const idx = this.value;
  if (idx === '') { STATE.autorActual = null; STATE.imgPerfil = null; updatePreview('Seleccione un autor.'); return; }
  const autor = STATE.autores[idx];
  STATE.autorActual = autor;
  STATE.imgPerfilLocal = null;

  document.getElementById('author-preview').innerHTML =
    `<strong>${autor.nombre}</strong><br>${autor.bio}`;

  setStatus('Cargando foto del autor…');
  if (autor.fotoBlob) {
    STATE.imgPerfil = await loadImage(autor.fotoBlob);
  } else if (autor.foto) {
    try { STATE.imgPerfil = await loadImage(autor.foto); } catch { STATE.imgPerfil = null; }
  } else {
    STATE.imgPerfil = null;
  }
  setStatus('');
  dibujar();
});

// ── Imagen de fondo ────────────────────────────────────────────────────────
document.getElementById('inp-fondo').addEventListener('change', async function () {
  const file = this.files[0];
  if (!file) return;
  document.getElementById('fondo-name').textContent = file.name;
  setStatus('Cargando imagen de fondo…');
  const url = URL.createObjectURL(file);
  STATE.imgFondo = await loadImage(url);
  setStatus('');
  dibujar();
});

// ── Eventos de UI ──────────────────────────────────────────────────────────
document.getElementById('inp-titulo').addEventListener('input', dibujar);
document.getElementById('sel-categoria').addEventListener('change', dibujar);
document.getElementById('btn-gen').addEventListener('click', () => { dibujar(); mostrarDescarga(); });

document.getElementById('btn-dl').addEventListener('click', () => {
  const cv = document.getElementById('cv');
  const a = document.createElement('a');
  const autor = STATE.autorActual ? STATE.autorActual.nombre.replace(/\s+/g, '_') : 'columna';
  a.download = `${autor}_${Date.now()}.png`;
  a.href = cv.toDataURL('image/png');
  a.click();
});

// ── Helpers ────────────────────────────────────────────────────────────────
function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => res(img);
    img.onerror = () => rej(new Error('No se pudo cargar: ' + src));
    img.src = src;
  });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function mostrarDescarga() {
  document.getElementById('btn-dl').style.display = 'block';
}

function updatePreview(msg) {
  document.getElementById('author-preview').textContent = msg;
}

// ── Ajuste de imagen para llenar rect sin distorsión (center-crop) ─────────
function drawImageCover(ctx, img, x, y, w, h) {
  const imgR = img.naturalWidth / img.naturalHeight;
  const boxR = w / h;
  let sx, sy, sw, sh;
  if (imgR > boxR) {
    sh = img.naturalHeight;
    sw = sh * boxR;
    sx = (img.naturalWidth - sw) / 2;
    sy = 0;
  } else {
    sw = img.naturalWidth;
    sh = sw / boxR;
    sx = 0;
    sy = (img.naturalHeight - sh) / 2;
  }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

// ── Ajuste de texto (wrap) ─────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineH));
  return lines.length;
}

// ── Dibujo principal ───────────────────────────────────────────────────────
function dibujar() {
  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const titulo    = document.getElementById('inp-titulo').value.trim();
  const categoria = document.getElementById('sel-categoria').value;
  const autor     = STATE.autorActual;

  // 1 — Base morada (canvas completo)
  ctx.fillStyle = PURPLE;
  ctx.fillRect(0, 0, W, H);

  // 2 — Imagen de fondo recortada a la zona superior (Fondo: 0-53.23%)
  if (STATE.imgFondo) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, FONDO_H);
    ctx.clip();
    drawImageCover(ctx, STATE.imgFondo, 0, 0, W, FONDO_H);
    ctx.restore();
    // Overlay morado Pantone sobre la foto de fondo
    ctx.fillStyle = OVERLAY;
    ctx.fillRect(0, 0, W, FONDO_H);
  }

  // 3 — Sección morada inferior sólida (Shape 5, desde 52.80%)
  ctx.fillStyle = PURPLE;
  ctx.fillRect(0, PURPLE_Y, W, H - PURPLE_Y);

  // 4 — Raya naranja (Shape 6: top=52.48%, h=0.75%) — DETRÁS de sombra y foto
  ctx.fillStyle = ORANGE;
  ctx.fillRect(0, STRIPE_Y, W, STRIPE_H);

  // 5 — Logo (imagen PNG extraída del PPT original)
  if (STATE.imgLogo) {
    ctx.drawImage(STATE.imgLogo, LOGO_X, LOGO_Y, LOGO_W, LOGO_H);
  }

  // 6 — Sombra fondo: cuadro semitransparente detrás de la foto (diseño original PPT)
  ctx.fillStyle = 'rgba(0,0,0,0.42)';
  ctx.fillRect(SHADOW_X, SHADOW_Y, SHADOW_W, SHADOW_H);

  // 7 — Foto del autor: llena exactamente el cuadro de la sombra fondo
  const img = STATE.imgPerfil;
  if (img) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(SHADOW_X, SHADOW_Y, SHADOW_W, SHADOW_H);
    ctx.clip();
    drawImageCover(ctx, img, SHADOW_X, SHADOW_Y, SHADOW_W, SHADOW_H);
    ctx.restore();
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(SHADOW_X, SHADOW_Y, SHADOW_W, SHADOW_H);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = `22px Alexandria, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Foto del autor', SHADOW_X + SHADOW_W / 2, SHADOW_Y + SHADOW_H / 2 + 10);
    ctx.textAlign = 'left';
  }

  // 8 — Categoría (OPINIÓN / ANÁLISIS / ...)
  ctx.fillStyle = ORANGE;
  ctx.font = `bold ${F_CAT}px Alexandria, sans-serif`;
  ctx.fillText(categoria, TX, Y_CAT + F_CAT);

  // 9 — Título — fuente se reduce si el texto es largo
  const txt = titulo
    ? `"${titulo}"`
    : '"Escriba aquí el título o la frase central de la columna"';
  const maxTitH = Y_MAX - Y_TIT;
  let fs = F_TIT;
  for (; fs >= 24; fs -= 2) {
    ctx.font = `bold ${fs}px Alexandria, sans-serif`;
    const lh = fs * 1.32;
    const wds = txt.split(' ');
    let ln = '', cnt = 0;
    for (const wd of wds) {
      const t = ln ? ln + ' ' + wd : wd;
      if (ctx.measureText(t).width > TW && ln) { cnt++; ln = wd; } else ln = t;
    }
    if (ln) cnt++;
    if (cnt * lh <= maxTitH) break;
  }
  ctx.fillStyle = WHITE;
  ctx.font = `bold ${fs}px Alexandria, sans-serif`;
  wrapText(ctx, txt, TX, Y_TIT + fs, TW, fs * 1.32);

  // 10 — Línea divisora horizontal
  ctx.fillStyle = ORANGE;
  ctx.fillRect(TX, Y_LIN, TW, 2);

  // 11 — Nombre del autor
  ctx.fillStyle = ORANGE;
  ctx.font = `bold ${F_AUT}px Alexandria, sans-serif`;
  ctx.fillText(autor ? autor.nombre.toUpperCase() : 'NOMBRE DEL VOCERO', TX, Y_AUT + F_AUT);

  // 12 — Bio
  ctx.fillStyle = WHITE;
  ctx.font = `${F_BIO}px Alexandria, sans-serif`;
  wrapText(ctx, autor ? autor.bio : 'Partido Dignidad & Compromiso', TX, Y_BIO + F_BIO, TW, F_BIO * 1.4);
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  // Precargar logo PNG extraído del PPT original
  try {
    STATE.imgLogo = await loadImage('Logo.png');
  } catch {
    STATE.imgLogo = null;
  }
  await cargarAutores();
  dibujar();
}

init();
</script>
</body>
</html>
